<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <title>Daily Paper Reader</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum=1.0">
  <!-- 初始引用信息，具体论文信息会由 Docsify 插件在运行时覆盖 -->
  <meta name="citation_journal_title" content="Daily Paper Reader (ArXiv)">
  <meta name="citation_title" content="Daily Paper Reader Default Entry">
  <meta name="citation_author" content="Daily Paper Reader Team">
  <meta name="citation_author" content="Docsify Renderer">
  <meta name="citation_date" content="2024/01/01">
  <meta name="citation_pdf_url" content="https://daily-paper-reader.invalid/default.pdf">
  <meta name="citation_volume" content="1">
  <meta name="citation_issue" content="1">
  <meta name="citation_firstpage" content="100">
  <meta name="citation_lastpage" content="110">

  <!-- 网站图标：图标保持本仓库相对路径，避免 CDN 不可用时影响首屏。 -->
  <link rel="icon" type="image/png" href="app/asserts/icon.png">

  <style>
    #secret-gate-overlay.secret-gate-hidden {
      display: none !important;
    }

    .dpr-initial-loading {
      position: fixed;
      inset: 0;
      z-index: 2000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      padding: 32px;
      color: #334155;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
    }

    .dpr-initial-loading[hidden] {
      display: none !important;
    }

    .dpr-initial-loading-card {
      min-width: 220px;
      padding: 22px 26px;
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
      text-align: center;
    }

    .dpr-initial-loading-mark {
      width: 34px;
      height: 34px;
      margin: 0 auto 12px;
      border-radius: 12px;
      background: #2563eb;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      line-height: 1;
    }

    .dpr-initial-loading-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .dpr-initial-loading-subtitle {
      margin-top: 6px;
      color: #64748b;
      font-size: 12px;
    }
  </style>

  <script>
    window.DPRHideInitialSplash = function () {
      var splash = document.getElementById('dpr-initial-splash');
      if (splash) {
        splash.hidden = true;
      }
    };
    document.addEventListener('dpr-docsify-ready', window.DPRHideInitialSplash);
    window.addEventListener('load', function () {
      window.setTimeout(window.DPRHideInitialSplash, 300);
    });
  </script>

  <script>
    (function () {
      var DEFAULT_CDN_BASE = 'https://cdn.zwwen.online';
      var CDN_PROBE_PATH = 'app/asserts/icon.png';
      var CDN_TIMEOUT_MS = 1800;
      var ASSET_TIMEOUT_MS = 6000;
      var explicitBase = String(window.DPR_CDN_BASE || '').replace(/\/$/, '');
      var disabled = String(window.DPR_DISABLE_CDN || '').toLowerCase() === '1';
      var candidateBase = disabled ? '' : (explicitBase || DEFAULT_CDN_BASE);
      var cdnUsablePromise = null;

      function normalizePath(path) {
        return String(path || '').replace(/^\/+/, '');
      }

      function localUrl(path) {
        return normalizePath(path);
      }

      function cdnUrl(path) {
        if (!candidateBase) return localUrl(path);
        return candidateBase + '/' + normalizePath(path);
      }

      function probeCdn() {
        if (!candidateBase) return Promise.resolve(false);
        if (cdnUsablePromise) return cdnUsablePromise;
        cdnUsablePromise = new Promise(function (resolve) {
          var done = false;
          var img = new Image();
          var timer = window.setTimeout(function () {
            if (done) return;
            done = true;
            resolve(false);
          }, CDN_TIMEOUT_MS);
          img.onload = function () {
            if (done) return;
            done = true;
            window.clearTimeout(timer);
            resolve(true);
          };
          img.onerror = function () {
            if (done) return;
            done = true;
            window.clearTimeout(timer);
            resolve(false);
          };
          img.src = cdnUrl(CDN_PROBE_PATH) + '?dpr_cdn_probe=' + Date.now();
        }).then(function (ok) {
          window.DPR_CDN_ACTIVE = !!ok;
          window.DPR_ASSET_BASE = ok ? candidateBase : '';
          if (!ok) {
            console.warn('[DPR] CDN 不可用，静态资源回退本仓库路径。');
          }
          return ok;
        });
        return cdnUsablePromise;
      }

      function appendStylesheet(path, useCdn) {
        return new Promise(function (resolve) {
          var finished = false;
          var link = document.createElement('link');
          var timer = window.setTimeout(function () {
            if (finished) return;
            finished = true;
            link.remove();
            if (useCdn) {
              console.warn('[DPR] CDN CSS 加载超时，回退本地：' + path);
              appendStylesheet(path, false).then(resolve);
            } else {
              resolve(false);
            }
          }, ASSET_TIMEOUT_MS);
          link.rel = 'stylesheet';
          link.href = useCdn ? cdnUrl(path) : localUrl(path);
          link.onload = function () {
            if (finished) return;
            finished = true;
            window.clearTimeout(timer);
            resolve(true);
          };
          link.onerror = function () {
            if (finished) return;
            finished = true;
            window.clearTimeout(timer);
            link.remove();
            if (useCdn) {
              console.warn('[DPR] CDN CSS 加载失败，回退本地：' + path);
              appendStylesheet(path, false).then(resolve);
            } else {
              resolve(false);
            }
          };
          document.head.appendChild(link);
        });
      }

      function preloadScript(path, useCdn) {
        var link = document.createElement('link');
        link.rel = 'preload';
        link.as = 'script';
        link.href = useCdn ? cdnUrl(path) : localUrl(path);
        document.head.appendChild(link);
      }

      function appendScript(path, useCdn) {
        return new Promise(function (resolve, reject) {
          var finished = false;
          var script = document.createElement('script');
          var timer = window.setTimeout(function () {
            if (finished) return;
            finished = true;
            script.remove();
            if (useCdn) {
              console.warn('[DPR] CDN JS 加载超时，回退本地：' + path);
              appendScript(path, false).then(resolve, reject);
            } else {
              reject(new Error('静态脚本加载超时：' + path));
            }
          }, ASSET_TIMEOUT_MS);
          script.async = false;
          script.src = useCdn ? cdnUrl(path) : localUrl(path);
          script.onload = function () {
            if (finished) return;
            finished = true;
            window.clearTimeout(timer);
            resolve(true);
          };
          script.onerror = function () {
            if (finished) return;
            finished = true;
            window.clearTimeout(timer);
            script.remove();
            if (useCdn) {
              console.warn('[DPR] CDN JS 加载失败，回退本地：' + path);
              appendScript(path, false).then(resolve, reject);
            } else {
              reject(new Error('静态脚本加载失败：' + path));
            }
          };
          document.head.appendChild(script);
        });
      }

      function appendScriptsInOrder(paths, useCdn) {
        var chain = Promise.resolve();
        paths.forEach(function (path) {
          chain = chain.then(function () {
            return appendScript(path, useCdn);
          });
        });
        return chain;
      }

      window.DPRLoadAssets = function (assets) {
        return probeCdn().then(function (useCdn) {
          var styles = [];
          var scripts = [];
          assets.forEach(function (asset) {
            if (asset.type === 'style') styles.push(asset.path);
            if (asset.type === 'script') scripts.push(asset.path);
          });
          scripts.forEach(function (path) {
            preloadScript(path, useCdn);
          });
          return Promise.all(styles.map(function (path) {
            return appendStylesheet(path, useCdn);
          })).then(function () {
            return appendScriptsInOrder(scripts, useCdn);
          });
        });
      };
    })();
  </script>
</head>
<body>
  <!-- 首次进入时的密钥解锁 / 游客模式选择 -->
  <div id="secret-gate-overlay" class="secret-gate-overlay secret-gate-hidden">
    <div id="secret-gate-modal" class="secret-gate-modal">
      <h2 style="margin-top:0;">🔐 解锁密钥</h2>
      <p style="font-size:13px; color:#555; margin-bottom:8px;">
        为保护你的大模型 API Key 等敏感配置，请输入本地密码解锁，
        或选择以游客身份访问（仅支持阅读论文，无法使用后台面板和大模型对话）。
      </p>
      <label for="secret-gate-password" style="font-size:13px; color:#333; display:block; margin-bottom:4px;">
        解锁密码（至少 8 位，包含数字、小写字母、大写字母和特殊符号）：
      </label>
      <input
        id="secret-gate-password"
        type="password"
        autocomplete="off"
        style="width:100%; box-sizing:border-box; padding:6px 8px; margin-bottom:6px; font-size:13px;"
      />
      <div id="secret-gate-error" style="min-height:18px; font-size:12px; color:#999; margin-bottom:8px;">
        密码仅在本地用于解密，不会上传到服务器。
      </div>
      <div class="secret-gate-actions">
        <button id="secret-gate-guest" type="button" class="secret-gate-btn secondary">
          以游客身份访问
        </button>
        <button id="secret-gate-unlock" type="button" class="secret-gate-btn primary">
          解锁密钥
        </button>
      </div>
    </div>
  </div>

  <div id="dpr-initial-splash" class="dpr-initial-loading" role="status" aria-live="polite">
    <div class="dpr-initial-loading-card">
      <div class="dpr-initial-loading-mark" aria-hidden="true">D</div>
      <div class="dpr-initial-loading-title">Daily Paper Reader</div>
      <div class="dpr-initial-loading-subtitle">正在加载资源...</div>
    </div>
  </div>
  <div id="app"></div>

  <script>
    window.DPR_RUNTIME_SOURCE_BACKENDS = Object.assign(
      {
        biorxiv: {
          enabled: true,
        },
        medrxiv: {
          enabled: true,
        },
        chemrxiv: {
          enabled: true,
        },
        neurips: {
          enabled: true,
        },
        aaai: {
          enabled: true,
        },
        iclr: {
          enabled: true,
        },
        icml: {
          enabled: true,
        },
        acl: {
          enabled: true,
        },
        emnlp: {
          enabled: true,
        },
      },
      window.DPR_RUNTIME_SOURCE_BACKENDS || {},
    );

    window.DPRLoadAssets([
      { type: 'style', path: 'app/vendor/docsify/4/lib/themes/vue.css' },
      { type: 'style', path: 'app/vendor/katex/0.16.9/dist/katex.min.css' },
      { type: 'style', path: 'app/app.css' },
      { type: 'script', path: 'app/vendor/katex/0.16.9/dist/katex.min.js' },
      { type: 'script', path: 'app/vendor/katex/0.16.9/dist/contrib/auto-render.min.js' },
      { type: 'script', path: 'app/vendor/js-yaml/4.1.0/dist/js-yaml.min.js' },
      { type: 'script', path: 'app/vendor/libsodium/0.7.10/dist/modules/libsodium.js' },
      { type: 'script', path: 'app/vendor/libsodium-wrappers/0.7.9/dist/modules/libsodium-wrappers.js' },
      { type: 'script', path: 'app/llm-config-utils.js' },
      { type: 'script', path: 'app/secret.session.js' },
      { type: 'script', path: 'app/gist-share-utils.js' },
      { type: 'script', path: 'app/zotero-meta-utils.js' },
      { type: 'script', path: 'app/zotero-chat-utils.js' },
      { type: 'script', path: 'app/docsify-plugin.js' },
      { type: 'script', path: 'app/chat.discussion.js' },
      { type: 'script', path: 'app/subscriptions.github-token.js' },
      { type: 'script', path: 'app/subscriptions.smart-query.js' },
      { type: 'script', path: 'app/subscriptions.keywords.js' },
      { type: 'script', path: 'app/subscriptions.zotero.js' },
      { type: 'script', path: 'app/subscriptions.tracked-papers.js' },
      { type: 'script', path: 'app/subscriptions.manager.js' },
      { type: 'script', path: 'app/workflows.runner.js' },
      { type: 'script', path: 'app/ui.layout-and-subscriptions-entry.js' },
      { type: 'script', path: 'app/vendor/docsify/4/lib/docsify.min.js' },
    ]).then(function () {
      if (window.SubscriptionsManager) {
        window.SubscriptionsManager.init();
      }
    }).catch(function (err) {
      console.error('[DPR] 静态资源加载失败：', err);
      var app = document.getElementById('app');
      if (app) {
        app.innerHTML = '静态资源加载失败，请刷新页面或稍后重试。';
      }
    });
  </script>
</body>
</html>
